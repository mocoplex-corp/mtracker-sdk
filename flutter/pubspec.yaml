name: ja0tracker
description: >-
  mtracker Flutter SDK — mobile attribution, in-app events, deferred deep links, and
  native ad slots. Thin Pigeon/PlatformView wrapper over the native iOS/Android cores.
version: 1.0.5
homepage: https://github.com/mocoplex-corp/mtracker-sdk
publish_to: none # TODO(release): publish to pub.dev once the native bridges are done.

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  # Auto-registers the app's FCM push token on init (Ja0TrackerConfig.autoRegisterPush).
  firebase_messaging: '>=13.0.0'
  # Renders ja0 pushes while the app is in the foreground (Android). iOS uses
  # firebase_messaging's foreground presentation options instead.
  flutter_local_notifications: '>=17.0.0'
  # SDK-driven review prompt: the native in-app review (App Store / Play In-App
  # Review) is triggered for review-type App Ops messages — no host-app code.
  in_app_review: '>=2.0.0'
  # Desktop (Windows/macOS/Linux): opens ad landings / update-download / review
  # pages in the system browser (there is no native ad/App-Ops core on desktop).
  url_launcher: '>=6.2.0'
  # Reads the running app version for the desktop App Ops update check.
  package_info_plus: '>=5.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Type-safe platform channels (docs/sdk.md §4 — Flutter uses Pigeon).
  # Run `dart run pigeon --input pigeons/messages.dart` to regenerate messages.g.dart.
  pigeon: ^21.0.0

# Federated-ish single package: one plugin package implements both platforms by
# bridging the shared native cores (docs/sdk.md §4).
flutter:
  plugin:
    platforms:
      android:
        package: io.ja0tracker.flutter
        pluginClass: Ja0TrackerPlugin
      ios:
        pluginClass: Ja0TrackerPlugin
